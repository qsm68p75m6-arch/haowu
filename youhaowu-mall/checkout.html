<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下单结算 - 有郝物</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .checkout-page {
      padding: 20px 0;
      padding-bottom: 150px;
    }

    .checkout-section {
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    /* 收货地址 */
    .address-list {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .address-item {
      width: 280px;
      padding: 15px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .address-item:hover {
      border-color: var(--primary-light);
    }

    .address-item.selected {
      border-color: var(--primary-color);
      background: rgba(255, 127, 36, 0.05);
    }

    .address-item.selected::after {
      content: '✓';
      position: absolute;
      top: 10px;
      right: 10px;
      color: var(--primary-color);
      font-size: 18px;
    }

    .address-item .name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .address-item .phone {
      font-size: 13px;
      color: var(--text-gray);
      margin-bottom: 5px;
    }

    .address-item .detail {
      font-size: 13px;
      color: var(--text-dark);
      line-height: 1.5;
    }

    .address-item .default-tag {
      display: inline-block;
      padding: 2px 6px;
      background: var(--primary-color);
      color: #fff;
      font-size: 10px;
      border-radius: 2px;
      margin-left: 8px;
    }

    .address-add {
      width: 280px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-gray);
    }

    .address-add:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    .address-add .icon {
      font-size: 24px;
      margin-bottom: 5px;
    }

    /* 商品列表 */
    .order-item {
      display: flex;
      gap: 15px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-item .image {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .order-item .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .order-item .info {
      flex: 1;
    }

    .order-item .name {
      font-size: 14px;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .order-item .spec {
      font-size: 12px;
      color: var(--text-gray);
      margin-bottom: 10px;
    }

    .order-item .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-item .price {
      font-size: 15px;
      color: var(--primary-color);
      font-weight: 500;
    }

    .order-item .quantity {
      font-size: 13px;
      color: var(--text-gray);
    }

    /* 价格明细 */
    .price-detail {
      padding: 15px 0;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .price-row .label {
      color: var(--text-gray);
    }

    .price-row .value {
      color: var(--text-dark);
    }

    .price-row.total {
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
      margin-top: 15px;
    }

    .price-row.total .label {
      font-size: 15px;
      color: var(--text-dark);
    }

    .price-row.total .value {
      font-size: 24px;
      color: var(--primary-color);
      font-weight: bold;
    }

    /* 订单备注 */
    .order-remark {
      margin-top: 15px;
    }

    .order-remark textarea {
      width: 100%;
      height: 80px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 14px;
      resize: none;
    }

    .order-remark textarea:focus {
      border-color: var(--primary-color);
    }

    /* 底部结算栏 */
    .checkout-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #FF7F24 0%, #FFB366 100%);
      padding: 15px 20px;
      z-index: 100;
    }

    .checkout-footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 30px;
    }

    .footer-total {
      text-align: right;
    }

    .footer-total .label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .footer-total .price {
      font-size: 28px;
      color: #fff;
      font-weight: bold;
    }

    .payment-methods {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .payment-methods .label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .payment-methods .options {
      display: flex;
      gap: 10px;
    }

    .payment-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 15px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s;
      color: #fff;
    }

    .payment-option:hover,
    .payment-option.selected {
      background: rgba(255, 255, 255, 0.3);
    }

    .payment-option input {
      accent-color: #fff;
    }

    .submit-btn {
      padding: 15px 40px;
      font-size: 16px;
      background: #fff;
      color: var(--primary-color);
      border-radius: var(--radius-md);
    }

    .submit-btn:hover {
      background: #f5f5f5;
    }

    .submit-btn:disabled {
      background: rgba(255, 255, 255, 0.5);
      cursor: not-allowed;
    }

    /* 无地址提示 */
    .no-address {
      text-align: center;
      padding: 30px;
      color: var(--text-gray);
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-logo" onclick="location.href='index.html'">
        <span>🛒</span>
        <span>有郝物</span>
      </div>

      <div class="navbar-menu">
        <a href="index.html">首页</a>
        <a href="category.html">全部分类</a>
        <a href="orders.html">我的订单</a>
        <a href="#">客服中心</a>
      </div>

      <div class="navbar-search">
        <input type="text" placeholder="搜索好物，应有尽有">
        <span class="search-icon">🔍</span>
      </div>

      <div class="navbar-actions">
        <div class="navbar-user" style="display: flex;">
          <div class="avatar">
            <img src="https://picsum.photos/100/100?random=user" alt="用户头像">
          </div>
          <span class="username">用户</span>
          <div class="navbar-user-dropdown">
            <a href="orders.html">我的订单</a>
            <a href="#">我的收藏</a>
            <a href="#">收货地址</a>
            <a href="#" id="logoutBtn">退出登录</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content container">
    <div class="checkout-page">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1 class="page-title">下单结算</h1>
      </div>

      <!-- 收货地址 -->
      <div class="checkout-section">
        <div class="section-title">收货地址</div>
        <div class="address-list" id="addressList"></div>
      </div>

      <!-- 订单信息 -->
      <div class="checkout-section">
        <div class="section-title">订单信息</div>
        <div id="orderItems"></div>

        <!-- 价格明细 -->
        <div class="price-detail">
          <div class="price-row">
            <span class="label">商品总价</span>
            <span class="value" id="productTotal">¥0.00</span>
          </div>
          <div class="price-row">
            <span class="label">运费</span>
            <span class="value">¥0.00（包邮）</span>
          </div>
          <div class="price-row total">
            <span class="label">实付款</span>
            <span class="value" id="actualTotal">¥0.00</span>
          </div>
        </div>

        <!-- 订单备注 -->
        <div class="order-remark">
          <label class="form-label">订单备注</label>
          <textarea id="orderRemark" placeholder="请输入订单备注（如送货时间、特殊要求，限200字）" maxlength="200"></textarea>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部结算栏 -->
  <div class="checkout-footer">
    <div class="checkout-footer-inner">
      <div class="payment-methods">
        <span class="label">支付方式：</span>
        <div class="options">
          <label class="payment-option selected">
            <input type="radio" name="payment" value="wechat" checked>
            <span>💚 微信支付</span>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="alipay">
            <span>💙 支付宝</span>
          </label>
        </div>
      </div>
      <div class="footer-total">
        <div class="label">实付款</div>
        <div class="price" id="footerTotal">¥0.00</div>
      </div>
      <button class="btn submit-btn" id="submitBtn" onclick="submitOrder()">提交订单并支付</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let orderItems = [];
    let addresses = [
      {
        id: '1',
        name: '张三',
        phone: '13888888888',
        province: '北京市',
        city: '北京市',
        district: '朝阳区',
        detail: '某某小区1号楼101室',
        isDefault: true
      },
      {
        id: '2',
        name: '李四',
        phone: '13999999999',
        province: '上海市',
        city: '上海市',
        district: '浦东新区',
        detail: '某某路888号',
        isDefault: false
      }
    ];
    let selectedAddressId = '1';

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 检查登录
      if (!User.checkLogin()) {
        Modal.confirm('请先登录', () => {
          location.href = 'index.html';
        });
        return;
      }

      loadOrderItems();
      renderAddresses();
      renderOrderItems();
      bindEvents();
    });

    // 加载订单商品
    function loadOrderItems() {
      // 从URL参数获取单商品购买
      const productId = Utils.getUrlParam('productId');
      const quantity = parseInt(Utils.getUrlParam('quantity'));

      if (productId && quantity) {
        const product = productsData.find(p => p.id === parseInt(productId));
        if (product) {
          orderItems = [{
            id: Utils.generateId(),
            productId: product.id,
            name: product.name,
            image: product.images[0],
            price: product.currentPrice,
            quantity: quantity,
            specs: {},
            stock: product.stock
          }];
        }
      } else {
        // 从购物车获取
        orderItems = Utils.storage.get('checkoutItems') || [];
      }
    }

    // 渲染地址列表
    function renderAddresses() {
      const container = document.getElementById('addressList');

      if (addresses.length === 0) {
        container.innerHTML = `
          <div class="no-address">
            <p>暂无收货地址，请先新增</p>
          </div>
          <div class="address-add" onclick="showAddAddress()">
            <span class="icon">+</span>
            <span>新增地址</span>
          </div>
        `;
        return;
      }

      container.innerHTML = addresses.map(addr => `
        <div class="address-item ${addr.id === selectedAddressId ? 'selected' : ''}" onclick="selectAddress('${addr.id}')">
          <div class="name">
            ${addr.name}
            ${addr.isDefault ? '<span class="default-tag">默认</span>' : ''}
          </div>
          <div class="phone">${Utils.maskPhone(addr.phone)}</div>
          <div class="detail">${addr.province} ${addr.city} ${addr.district} ${addr.detail}</div>
        </div>
      `).join('') + `
        <div class="address-add" onclick="showAddAddress()">
          <span class="icon">+</span>
          <span>新增地址</span>
        </div>
      `;
    }

    // 选择地址
    function selectAddress(id) {
      selectedAddressId = id;
      renderAddresses();
    }

    // 显示新增地址弹窗
    function showAddAddress() {
      Modal.show({
        title: '新增地址',
        content: `
          <div class="form-group">
            <label class="form-label">收货人</label>
            <input type="text" class="form-input" id="addrName" placeholder="请输入收货人姓名">
          </div>
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="addrPhone" placeholder="请输入手机号">
          </div>
          <div class="form-group">
            <label class="form-label">所在地区</label>
            <div style="display: flex; gap: 10px;">
              <select class="form-input form-select" id="addrProvince" style="flex: 1;">
                <option value="北京市">北京市</option>
                <option value="上海市">上海市</option>
                <option value="广东省">广东省</option>
              </select>
              <select class="form-input form-select" id="addrCity" style="flex: 1;">
                <option value="北京市">北京市</option>
                <option value="上海市">上海市</option>
                <option value="广州市">广州市</option>
              </select>
              <select class="form-input form-select" id="addrDistrict" style="flex: 1;">
                <option value="朝阳区">朝阳区</option>
                <option value="浦东新区">浦东新区</option>
                <option value="天河区">天河区</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">详细地址</label>
            <textarea class="form-input form-textarea" id="addrDetail" placeholder="请输入详细地址" style="height: 80px;"></textarea>
          </div>
          <div class="form-group">
            <label class="filter-option">
              <input type="checkbox" id="addrDefault">
              <span>设为默认地址</span>
            </label>
          </div>
        `,
        width: 500,
        buttons: [
          { text: '取消', action: 'cancel' },
          {
            text: '保存',
            action: 'save',
            type: 'btn-primary',
            onClick: () => {
              const newAddress = {
                id: Utils.generateId(),
                name: document.getElementById('addrName').value,
                phone: document.getElementById('addrPhone').value,
                province: document.getElementById('addrProvince').value,
                city: document.getElementById('addrCity').value,
                district: document.getElementById('addrDistrict').value,
                detail: document.getElementById('addrDetail').value,
                isDefault: document.getElementById('addrDefault').checked
              };

              if (!newAddress.name || !newAddress.phone || !newAddress.detail) {
                Modal.alert('请填写完整信息', 'warning');
                return false;
              }

              if (!/^1[3-9]\d{9}$/.test(newAddress.phone)) {
                Modal.alert('请输入正确的手机号', 'warning');
                return false;
              }

              if (newAddress.isDefault) {
                addresses.forEach(a => a.isDefault = false);
              }

              addresses.push(newAddress);
              selectedAddressId = newAddress.id;
              renderAddresses();
              return true;
            }
          }
        ]
      });
    }

    // 渲染订单商品
    function renderOrderItems() {
      const container = document.getElementById('orderItems');

      container.innerHTML = orderItems.map(item => `
        <div class="order-item">
          <div class="image">
            <img src="${item.image}" alt="${item.name}">
          </div>
          <div class="info">
            <div class="name">${item.name}</div>
            <div class="spec">${Object.values(item.specs || {}).join(' / ') || '默认规格'}</div>
            <div class="price-row">
              <span class="price">¥${item.price}</span>
              <span class="quantity">x${item.quantity}</span>
            </div>
          </div>
        </div>
      `).join('');

      // 计算总价
      const total = orderItems.reduce((sum, item) => sum + item.price * item.quantity, 0);
      document.getElementById('productTotal').textContent = '¥' + total.toFixed(2);
      document.getElementById('actualTotal').textContent = '¥' + total.toFixed(2);
      document.getElementById('footerTotal').textContent = '¥' + total.toFixed(2);
    }

    // 绑定事件
    function bindEvents() {
      // 支付方式选择
      document.querySelectorAll('.payment-option').forEach(option => {
        option.addEventListener('click', function() {
          document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
          this.classList.add('selected');
          this.querySelector('input').checked = true;
        });
      });
    }

    // 提交订单
    function submitOrder() {
      if (!selectedAddressId) {
        Modal.alert('请选择收货地址', 'warning');
        return;
      }

      const total = orderItems.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const payment = document.querySelector('input[name="payment"]:checked').value;
      const remark = document.getElementById('orderRemark').value;

      Modal.confirm(`确认提交订单并支付 ¥${total.toFixed(2)} 吗？`, () => {
        // 创建订单
        const order = {
          id: Utils.generateId(),
          items: orderItems,
          address: addresses.find(a => a.id === selectedAddressId),
          total: total,
          payment: payment,
          remark: remark,
          status: 'pending_payment',
          createTime: new Date().toISOString()
        };

        // 保存订单
        if (!userData.orders) userData.orders = [];
        userData.orders.push(order);
        User.save();

        // 清空购物车中已结算的商品
        const orderItemIds = orderItems.map(i => i.id);
        userData.cart = userData.cart.filter(i => !orderItemIds.includes(i.id));
        User.save();
        User.updateNavbar();

        // 显示支付成功
        Modal.show({
          title: '支付成功',
          content: `
            <div class="text-center">
              <div style="font-size: 64px; color: var(--color-green); margin-bottom: 20px;">✓</div>
              <p style="font-size: 18px; color: var(--text-dark); margin-bottom: 10px;">订单提交成功！</p>
              <p style="font-size: 14px; color: var(--text-gray);">订单号：${order.id}</p>
              <p style="font-size: 24px; color: var(--primary-color); margin-top: 15px;">实付款：¥${total.toFixed(2)}</p>
            </div>
          `,
          buttons: [
            {
              text: '查看订单',
              action: 'view',
              type: 'btn-primary',
              onClick: () => {
                location.href = 'orders.html';
              }
            },
            {
              text: '继续购物',
              action: 'continue',
              onClick: () => {
                location.href = 'index.html';
              }
            }
          ]
        });
      });
    }
  </script>
</body>
</html>
